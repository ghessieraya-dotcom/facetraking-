<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <title>نظام آية المتكامل v19</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
  <style>
    :root { --accent: #6366f1; --bg: #020617; --card: #0f172a; --success: #10b981; --warning: #f59e0b; }
    body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; }
    #side-panel { width: 320px; background: var(--card); padding: 20px; border-left: 2px solid #1e293b; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
    #main-display { flex: 1; position: relative; background: #000; display: flex; justify-content: center; align-items: center; }
    canvas { position: absolute; width: 100%; height: 100%; object-fit: contain; transform: scaleX(-1); z-index: 10; }
    video { position: absolute; width: 1px; height: 1px; opacity: 0; }
    .stat-card { background: #1e293b; padding: 12px; border-radius: 10px; border-right: 4px solid var(--accent); transition: 0.3s; }
    .label { font-size: 0.75rem; color: #94a3b8; }
    .value { font-size: 1.1rem; font-weight: bold; margin-top: 4px; }
    .active { border-right-color: var(--success); background: rgba(16, 185, 129, 0.1); }
    button { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    #calib-btn { background: var(--success); margin-bottom: 10px; }
  </style>
</head>
<body>

<aside id="side-panel">
  <h2 style="color:var(--accent); text-align:center; margin:0 0 15px 0;">AYA AI PRO</h2>
  <button id="calib-btn" onclick="calibrate()">🎯 معايرة النظام الشخصي</button>

  <div class="stat-card" id="card-blink">
    <div class="label">عداد الرمش</div>
    <div id="blink-val" class="value">0</div>
  </div>

  <div class="stat-card" id="card-brow">
    <div class="label">الحواجب (تعجب/غضب)</div>
    <div id="brow-val" class="value">--</div>
  </div>

  <div class="stat-card" id="card-mouth">
    <div class="label">نشاط الفم (كلام/تثاؤب)</div>
    <div id="mouth-val" class="value">صامت</div>
  </div>

  <div class="stat-card" id="card-hand">
    <div class="label">حركة اليد</div>
    <div id="hand-val" class="value">مستقرة</div>
  </div>

  <button onclick="location.reload()">إعادة تشغيل 🔄</button>
</aside>

<main id="main-display">
  <video id="input_video" playsinline></video>
  <canvas id="output_canvas"></canvas>
</main>

<script type="module">
  const video = document.getElementById('input_video');
  const canvas = document.getElementById('output_canvas');
  const ctx = canvas.getContext('2d');
  
  let blinks = 0, isClosed = false, mouthHistory = [];
  let baseEAR = 0.22, baseBrowDist = 0.05, baseMouthH = 0.02, isCalibrated = false;
  let lastFaceLM = null, lastHandLM = null;

  const dist = (p1, p2) => Math.hypot(p1.x - p2.x, p1.y - p2.y);

  const faceMesh = new FaceMesh({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
  faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: false, minDetectionConfidence: 0.5 });

  const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
  hands.setOptions({ maxNumHands: 1, minDetectionConfidence: 0.5 });

  faceMesh.onResults(res => { if(res.multiFaceLandmarks) lastFaceLM = res.multiFaceLandmarks[0]; });
  hands.onResults(res => { if(res.multiHandLandmarks) lastHandLM = res.multiHandLandmarks[0]; });

  window.calibrate = () => {
    if (lastFaceLM) {
        baseEAR = (dist(lastFaceLM[159], lastFaceLM[145]) + dist(lastFaceLM[386], lastFaceLM[374])) / (2 * dist(lastFaceLM[33], lastFaceLM[133]));
        baseBrowDist = dist(lastFaceLM[105], lastFaceLM[159]);
        baseMouthH = dist(lastFaceLM[13], lastFaceLM[14]);
        isCalibrated = true;
        alert("تم حفظ بصمة وجهكِ! النظام الآن يعرف تعابيركِ الطبيعية.");
    }
  };

  function render() {
    if (video.readyState === 4) {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.save();
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      if (lastFaceLM) {
        const lm = lastFaceLM;
        drawConnectors(ctx, lm, FACEMESH_TESSELATION, {color: '#ffffff20', lineWidth: 1});

        // 1. تحليل الرمش
        const currentEAR = (dist(lm[159], lm[145]) + dist(lm[386], lm[374])) / (2 * dist(lm[33], lm[133]));
        if (currentEAR < baseEAR * 0.78) isClosed = true;
        else if (isClosed && currentEAR > baseEAR * 0.88) { blinks++; document.getElementById('blink-val').innerText = blinks; isClosed = false; }

        if (isCalibrated) {
            // 2. تحليل الحواجب (الاندهاش والتعجب)
            const currentBrow = dist(lm[105], lm[159]);
            const browVal = document.getElementById('brow-val');
            if (currentBrow > baseBrowDist * 1.3) { browVal.innerText = "اندهاش / تعجب 😲"; document.getElementById('card-brow').classList.add('active'); }
            else if (currentBrow < baseBrowDist * 0.85) { browVal.innerText = "تركيز شديد 😠"; document.getElementById('card-brow').classList.add('active'); }
            else { browVal.innerText = "طبيعي"; document.getElementById('card-brow').classList.remove('active'); }

            // 3. تحليل الفم والكلام
            const currentMouth = dist(lm[13], lm[14]);
            const mouthVal = document.getElementById('mouth-val');
            if (currentMouth > baseMouthH + 0.05) {
                mouthVal.innerText = "تثاؤب 🥱";
            } else if (currentMouth > baseMouthH + 0.015) {
                mouthVal.innerText = "يتحدث الآن 🗣️";
                document.getElementById('card-mouth').classList.add('active');
            } else {
                mouthVal.innerText = "صامت";
                document.getElementById('card-mouth').classList.remove('active');
            }
        }
      }

      if (lastHandLM) {
        drawConnectors(ctx, lastHandLM, HAND_CONNECTIONS, {color: '#00ff00', lineWidth: 2});
        document.getElementById('hand-val').innerText = "يد نشطة ✋";
        document.getElementById('card-hand').classList.add('active');
      } else {
        document.getElementById('hand-val').innerText = "مستقرة";
        document.getElementById('card-hand').classList.remove('active');
      }
      ctx.restore();
    }
    requestAnimationFrame(render);
  }

  async function startAI() {
    if (video.readyState === 4) {
      await faceMesh.send({image: video});
      await hands.send({image: video});
    }
    setTimeout(startAI, 45); // توازن بين السرعة والدقة
  }

  const camera = new Camera(video, { onFrame: async () => {}, width: 640, height: 480 });
  camera.start().then(() => { render(); startAI(); });
</script>
</body>
</html>
