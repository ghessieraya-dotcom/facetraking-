<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <title>نظام آية للتحليل السلوكي - الإصدار الاحترافي</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

  <style>
    :root { --bg: #020617; --panel: #0f172a; --accent: #6366f1; --success: #10b981; --warning: #f59e0b; --danger: #ef4444; --text: #f8fafc; }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui; display: flex; height: 100vh; overflow: hidden; }
    #sidebar { width: 350px; background: var(--panel); border-left: 1px solid #1e293b; padding: 30px; display: flex; flex-direction: column; gap: 20px; z-index: 50; }
    .card { background: #1e293b; padding: 20px; border-radius: 20px; border: 1px solid #334155; position: relative; }
    .card::before { content: ""; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--accent); }
    .card-title { font-size: 0.85rem; color: #94a3b8; font-weight: 600; margin-bottom: 10px; }
    .card-value { font-size: 2.2rem; font-weight: 800; }
    #main-viewport { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; background: radial-gradient(circle at center, #1e1b4b 0%, #020617 100%); }
    #video-container { position: relative; width: 90%; max-width: 850px; aspect-ratio: 4/3; border-radius: 35px; overflow: hidden; border: 4px solid #1e293b; }
    video, canvas { position: absolute; width: 100%; height: 100%; transform: scaleX(-1); object-fit: cover; }
    #status-badge { position: absolute; top: 40px; left: 50%; transform: translateX(-50%); background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(15px); padding: 15px 45px; border-radius: 100px; border: 2px solid var(--accent); display: flex; align-items: center; gap: 20px; z-index: 100; }
    #current-emoji { font-size: 3rem; }
    #emergency-overlay { display: none; position: fixed; inset: 0; background: rgba(127, 29, 29, 0.98); z-index: 1000; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
    button { padding: 18px; border-radius: 15px; border: none; font-weight: 700; cursor: pointer; transition: 0.3s; }
    .primary-btn { background: var(--accent); color: white; }
    #calib-tray { display: none; margin-top: 10px; }
    .progress-track { width: 100%; height: 10px; background: #0f172a; border-radius: 10px; overflow: hidden; }
    .progress-fill { width: 0%; height: 100%; background: var(--success); transition: 0.1s linear; }
  </style>
</head>
<body>

  <aside id="sidebar">
    <h1 style="font-size: 1.5rem; color: var(--accent); text-align: center;">AYA ANALYTICS</h1>
    <div class="card">
      <div class="card-title">مؤشر التركيز</div>
      <div id="focus-score" class="card-value">100%</div>
      <div id="focus-trend" style="font-size: 0.8rem; color: var(--success);">الحالة: مستقرة</div>
    </div>
    <div class="card">
      <div class="card-title">تحليل العضلات</div>
      <div id="muscle-label" style="font-weight: bold; color: var(--accent);">جاهز</div>
      <div id="muscle-description" style="font-size: 0.8rem; opacity: 0.6;">انتظار المعايرة...</div>
    </div>
    <div class="card">
      <div class="card-title">نشاط العين</div>
      <div id="blink-count" class="card-value">0</div>
    </div>
    <div id="calib-tray">
      <div class="progress-track"><div id="calib-fill" class="progress-fill"></div></div>
    </div>
    <button class="primary-btn" onclick="initiateDeepCalibration()">🎯 معايرة الملامح</button>
    <button style="background:transparent; color:#94a3b8; border:1px solid #334155; margin-top:10px;" onclick="location.reload()">إعادة تشغيل</button>
  </aside>

  <main id="main-viewport">
    <div id="status-badge">
      <span id="current-emoji">📖</span>
      <div id="status-info">
        <h3 id="status-headline" style="margin:0;">تحميل النظام...</h3>
        <p id="status-subline" style="margin:0; font-size:0.8rem;">يرجى الانتظار</p>
      </div>
    </div>
    <div id="video-container">
      <video id="webcam" style="display:none;" playsinline></video>
      <canvas id="visualizer"></canvas>
    </div>
    <div id="emergency-overlay">
      <h1 style="font-size: 5rem; color: white;">⚠️ استيقظي!</h1>
      <button style="background: white; color: var(--danger); padding: 20px 60px;" onclick="deactivateAlarm()">أنا مستيقظة</button>
    </div>
  </main>

<script type="module">
  const video = document.getElementById('webcam');
  const canvas = document.getElementById('visualizer');
  const ctx = canvas.getContext('2d');
  
  // متغيرات الحالة
  let baseEAR = 0.22, baseBrowGap = 0.15, baseMouthW = 0.1;
  let lastLM = null, isCalibrating = false, blinkCount = 0;
  let lastEyeState = true, sleepTimer = null, globalFocus = 100, frameCount = 0;

  const getDist = (p1, p2) => Math.hypot(p1.x - p2.x, p1.y - p2.y);

  function calculateEAR(lm) {
    const lV = getDist(lm[160], lm[144]) + getDist(lm[158], lm[153]);
    const lH = getDist(lm[33], lm[133]) * 2;
    const rV = getDist(lm[385], lm[380]) + getDist(lm[387], lm[373]);
    const rH = getDist(lm[362], lm[263]) * 2;
    return ((lV / lH) + (rV / rH)) / 2;
  }

  window.initiateDeepCalibration = function() {
    if (!lastLM) { alert("انتظري رصد الوجه أولاً"); return; }
    isCalibrating = true;
    document.getElementById('calib-tray').style.display = 'block';
    let s = { ear: [], brow: [], mouth: [] };
    const interval = setInterval(() => {
      if (lastLM) {
        s.ear.push(calculateEAR(lastLM));
        s.brow.push(getDist(lastLM[52], lastLM[282]));
        s.mouth.push(getDist(lastLM[61], lastLM[291]));
        document.getElementById('calib-fill').style.width = (s.ear.length * 2) + '%';
      }
      if (s.ear.length >= 50) {
        clearInterval(interval);
        baseEAR = s.ear.reduce((a,b)=>a+b)/50;
        baseBrowGap = s.brow.reduce((a,b)=>a+b)/50;
        baseMouthW = s.mouth.reduce((a,b)=>a+b)/50;
        isCalibrating = false;
        document.getElementById('calib-tray').style.display = 'none';
        document.getElementById('status-headline').innerText = "تمت المعايرة ✅";
      }
    }, 40);
  };

  function processBehavior(results) {
    if (!results.multiFaceLandmarks || results.multiFaceLandmarks.length === 0) return;
    lastLM = results.multiFaceLandmarks[0];
    const lm = lastLM;
    const ear = calculateEAR(lm);

    // 1. منطق الرمش
    if (ear < baseEAR * 0.62 && lastEyeState) { lastEyeState = false; }
    else if (ear > baseEAR * 0.72 && !lastEyeState) { blinkCount++; document.getElementById('blink-count').innerText = blinkCount; lastEyeState = true; }

    // 2. منطق النوم (5 ثوانٍ)
    if (ear < baseEAR * 0.58) {
      if (!sleepTimer) sleepTimer = Date.now();
      if (Date.now() - sleepTimer > 5000) document.getElementById('emergency-overlay').style.display = 'flex';
    } else {
      sleepTimer = null;
      document.getElementById('emergency-overlay').style.display = 'none';
    }

    // 3. تحليل الملامح
    const bGap = getDist(lm[52], lm[282]);
    const bH = (getDist(lm[52], lm[159]) + getDist(lm[282], lm[386])) / 2;
    const mW = getDist(lm[61], lm[291]);
    const mH = getDist(lm[13], lm[14]);

    let rep = { e: "📖", h: "دراسة مستقرة", s: "حالة طبيعية", c: "#6366f1", m: "عضلات مسترخية" };

    if (frameCount % 60 === 0) {
      if (bGap < baseBrowGap * 0.92) globalFocus = Math.min(100, globalFocus + 0.5);
      if (mH > 0.05 || blinkCount > 40) globalFocus = Math.max(0, globalFocus - 1);
      document.getElementById('focus-score').innerText = Math.round(globalFocus) + "%";
    }

    if (bGap < baseBrowGap * 0.85) rep = { e: "🔥", h: "تركيز عميق", s: "تقطيب حواجب", c: "#10b981", m: "انقباض العضلة المقطبة" };
    else if (bH > baseBrowGap * 1.2) {
      if (ear > baseEAR * 1.15) rep = { e: "😲", h: "تعجب", s: "اتساع الجبهة", c: "#3b82f6", m: "انكماش العضلة الجبهية" };
      else rep = { e: "❓", h: "حيرة", s: "رفع حواجب", c: "#f59e0b", m: "توتر الجبهة" };
    }
    else if (mH > 0.06) rep = { e: "🥱", h: "ملل", s: "تثاؤب", c: "#a855f7", m: "ارتخاء الفك" };

    document.getElementById('current-emoji').innerText = rep.e;
    document.getElementById('status-headline').innerText = rep.h;
    document.getElementById('status-subline').innerText = rep.s;
    document.getElementById('muscle-label').innerText = rep.h;
    document.getElementById('muscle-description').innerText = rep.m;
    document.getElementById('status-badge').style.borderColor = rep.c;

    ctx.save();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
    drawConnectors(ctx, lm, FACEMESH_TESSELATION, {color: '#ffffff20', lineWidth: 0.5});
    ctx.restore();
    frameCount++;
  }

  window.deactivateAlarm = () => { sleepTimer = null; document.getElementById('emergency-overlay').style.display='none'; };

  const faceMesh = new FaceMesh({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
  faceMesh.setOptions({maxNumFaces:1, refineLandmarks:true, minDetectionConfidence:0.5, minTrackingConfidence:0.5});
  faceMesh.onResults(processBehavior);

  const cam = new Camera(video, {onFrame: async () => { await faceMesh.send({image: video}); }, width: 640, height: 480});
  cam.start().then(() => {
    document.getElementById('status-headline').innerText = "في انتظار الوجه...";
    document.getElementById('status-subline').innerText = "تم تشغيل الكاميرا";
  });
</script>
</body>
</html>
