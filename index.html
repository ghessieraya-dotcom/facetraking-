<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <title>نظام آية - نسخة الإنقاذ v12.3</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  
  <style>
    body { margin: 0; background: #020617; color: white; font-family: sans-serif; text-align: center; }
    #status-bar { background: #1e293b; padding: 15px; border-bottom: 2px solid #6366f1; display: flex; justify-content: space-around; }
    .val { color: #10b981; font-weight: bold; font-size: 1.2rem; }
    #container { position: relative; width: 100vw; height: 80vh; background: black; }
    video, canvas { position: absolute; top:0; left:0; width: 100%; height: 100%; object-fit: contain; transform: scaleX(-1); }
    #error-msg { color: #ef4444; padding: 20px; display: none; }
  </style>
</head>
<body>

<div id="status-bar">
  <div>الرمش: <span id="blink-count" class="val">0</span></div>
  <div>الحالة: <span id="state-text" class="val">بانتظار الكاميرا</span></div>
</div>

<div id="error-msg">⚠️ عذراً آية، لم نتمكن من تشغيل الكاميرا. تأكدي من إغلاق أي تطبيق آخر يستخدمها واضغطي تحديث.</div>

<div id="container">
  <video id="input_video" playsinline></video>
  <canvas id="output_canvas"></canvas>
</div>

<script>
  const videoElement = document.getElementById('input_video');
  const canvasElement = document.getElementById('output_canvas');
  const canvasCtx = canvasElement.getContext('2d');
  const blinkDisplay = document.getElementById('blink-count');
  const stateDisplay = document.getElementById('state-text');

  let blinks = 0;
  let isClosed = false;
  let baseEAR = 0.25; // القيمة المرجعية للعين

  // دالة حساب المسافة بين النقاط
  function dist(p1, p2) { return Math.hypot(p1.x - p2.x, p1.y - p2.y); }

  function onResults(results) {
    // ضبط أبعاد الكانفاس لتطابق الفيديو
    canvasElement.width = videoElement.videoWidth;
    canvasElement.height = videoElement.videoHeight;

    canvasCtx.save();
    canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
    canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

    if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
      const lm = results.multiFaceLandmarks[0];
      
      // رسم شبكة الوجه (للتأكد من الدقة)
      drawConnectors(canvasCtx, lm, FACEMESH_TESSELATION, {color: '#C0C0C040', lineWidth: 1});

      // منطق الرمش (باستخدام نقاط الجفن العلوي والسفلي)
      const eyeV = dist(lm[159], lm[145]) + dist(lm[386], lm[374]);
      const eyeH = dist(lm[33], lm[133]) + dist(lm[362], lm[263]);
      const ear = eyeV / (2 * eyeH);

      if (ear < 0.18) { // العين مغلقة
        if (!isClosed) {
          isClosed = true;
        }
      } else { // العين مفتوحة
        if (isClosed) {
          blinks++;
          blinkDisplay.innerText = blinks;
          isClosed = false;
        }
      }

      // رصد الكتابة (إذا كان بؤبؤ العين ينظر للأسفل)
      const irisY = lm[468].y;
      stateDisplay.innerText = (irisY > 0.65) ? "يكتب الآن 📝" : "مركّز ✅";
    }
    canvasCtx.restore();
  }

  const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
  faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
  faceMesh.onResults(onResults);

  // تشغيل الكاميرا بأبسط طريقة ممكنة
  const camera = new Camera(videoElement, {
    onFrame: async () => {
      await faceMesh.send({image: videoElement});
    },
    width: 640,
    height: 480
  });

  camera.start().catch(err => {
    document.getElementById('error-msg').style.display = 'block';
    stateDisplay.innerText = "خطأ في الاتصال";
  });
</script>
</body>
</html>
