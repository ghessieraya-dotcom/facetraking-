
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <title>مختبر آية - v12.2 التشغيل السريع</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
  
  <style>
    :root { --accent: #6366f1; --bg: #020617; --success: #10b981; }
    body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
    #header { background: #0f172a; padding: 10px; display: flex; justify-content: space-around; border-bottom: 2px solid var(--accent); }
    .stat { text-align: center; background: #1e293b; padding: 5px 15px; border-radius: 8px; min-width: 120px; }
    #container { flex: 1; position: relative; background: #000; }
    video, canvas { position: absolute; width: 100%; height: 100%; object-fit: contain; transform: scaleX(-1); }
    #overlay { position: fixed; inset: 0; background: rgba(2,6,23,0.9); z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--accent); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 15px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="overlay">
  <div class="loader"></div>
  <div id="load-msg">جاري تفعيل الكاميرا والمحركات...</div>
  <button id="start-btn" style="display:none; margin-top:20px; padding:10px 25px; cursor:pointer;" onclick="forceStart()">تشغيل يدوي</button>
</div>

<header id="header">
  <div class="stat">الرمش: <b id="blink-val" style="color:var(--success); font-size:1.5rem;">0</b></div>
  <div class="stat">الحالة: <b id="status-val">جاري الرصد</b></div>
  <div class="stat">الذكاء: <b id="ai-load" style="color:var(--accent);">0%</b></div>
</header>

<div id="container">
  <video id="v" playsinline></video>
  <canvas id="c"></canvas>
</div>

<script>
  const v = document.getElementById('v'), c = document.getElementById('c'), ctx = c.getContext('2d');
  let bEAR = 0.22, blinks = 0, lastE = true;
  let faceReady = false, handReady = false;

  // إعداد المحركات مع نظام "التأكيد"
  const faceMesh = new FaceMesh({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
  faceMesh.setOptions({maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5});
  faceMesh.onResults(onFaceResults);

  const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
  hands.setOptions({maxNumHands: 1, minDetectionConfidence: 0.5});
  hands.onResults(onHandResults);

  let lastHandRes = null;

  function onFaceResults(res) {
    faceReady = true;
    checkReady();
    ctx.save();
    ctx.clearRect(0,0,c.width,c.height);
    ctx.drawImage(res.image, 0,0,c.width,c.height);

    if(res.multiFaceLandmarks && res.multiFaceLandmarks.length > 0) {
      const lm = res.multiFaceLandmarks[0];
      drawConnectors(ctx, lm, FACEMESH_TESSELATION, {color: '#C0C0C050', lineWidth: 1});
      
      // منطق الرمش الدقيق
      const ear = (Math.hypot(lm[159].x-lm[145].x, lm[159].y-lm[145].y) + Math.hypot(lm[386].x-lm[374].x, lm[386].y-lm[374].y)) / (2 * Math.hypot(lm[33].x-lm[133].x, lm[33].y-lm[133].y));
      if(ear < bEAR * 0.7) { lastE = false; }
      else if(!lastE) { blinks++; document.getElementById('blink-val').innerText = blinks; lastE = true; }

      // كشف الكتابة
      document.getElementById('status-val').innerText = (lm[468].y > 0.65) ? "يكتب الآن 📝" : "مركّز ✅";
    }
    
    if(lastHandRes) {
      for(const hlm of lastHandRes) {
        drawConnectors(ctx, hlm, HAND_CONNECTIONS, {color: '#00FF00', lineWidth: 2});
      }
    }
    ctx.restore();
  }

  function onHandResults(res) {
    handReady = true;
    lastHandRes = res.multiHandLandmarks;
  }

  function checkReady() {
    if(faceReady) {
       document.getElementById('overlay').style.display = 'none';
       document.getElementById('ai-load').innerText = "100%";
    }
  }

  // محرك الكاميرا المحدث (Non-Blocking)
  async function start() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({video: {width: 640, height: 480}});
      v.srcObject = stream;
      v.play();
      
      v.onloadedmetadata = () => {
        c.width = v.videoWidth; c.height = v.videoHeight;
        sendFrames();
      };
    } catch(e) {
      document.getElementById('load-msg').innerText = "خطأ في الكاميرا! تأكدي من إعطاء الإذن.";
      document.getElementById('start-btn').style.display = 'block';
    }
  }

  async function sendFrames() {
    if(v.paused || v.ended) return;
    await faceMesh.send({image: v});
    await hands.send({image: v});
    requestAnimationFrame(sendFrames);
  }

  function forceStart() { location.reload(); }

  window.onload = start;
</script>
</body>
</html>
