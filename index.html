<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <title>Aya AI - High Sensitivity</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <style>
    body { margin: 0; background: #020617; color: white; font-family: sans-serif; overflow: hidden; display: flex; }
    #sidebar { width: 300px; background: #0f172a; padding: 20px; border-left: 1px solid #334155; display: flex; flex-direction: column; gap: 15px; }
    .card { background: #1e293b; padding: 15px; border-radius: 15px; border-right: 4px solid #6366f1; }
    #viewport { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; }
    video, canvas { position: absolute; width: 90%; height: 80%; border-radius: 20px; transform: scaleX(-1); object-fit: cover; }
    canvas { z-index: 10; pointer-events: none; }
    #badge { position: absolute; top: 20px; background: rgba(15, 23, 42, 0.9); padding: 10px 30px; border-radius: 50px; border: 2px solid #6366f1; z-index: 100; }
    #emergency { display: none; position: fixed; inset: 0; background: rgba(153, 27, 27, 0.95); z-index: 1000; flex-direction: column; justify-content: center; align-items: center; }
    button { padding: 15px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; background: #6366f1; color: white; }
  </style>
</head>
<body>

<aside id="sidebar">
  <h2 style="color:#6366f1; text-align:center;">AYA ANALYTICS</h2>
  <div class="card"><div>التركيز التراكمي</div><h1 id="f-score">100%</h1></div>
  <div class="card"><div>الحالة العضلية</div><p id="m-label" style="font-size:0.9rem;">بانتظار الوجه...</p></div>
  <div class="card"><div>الرمش</div><h2 id="b-count">0</h2></div>
  <button onclick="calibrate()">🎯 ابدأ المعايرة الآن</button>
  <button style="background:#334155" onclick="location.reload()">🔄 تحديث</button>
</aside>

<main id="viewport">
  <div id="badge"><b id="h-stat">جاري تشغيل الذكاء الاصطناعي...</b></div>
  <video id="v" playsinline></video>
  <canvas id="c"></canvas>
  <div id="emergency"><h1>⚠️ آية! استيقظي!</h1><button onclick="stopA()">أنا مستيقظة</button></div>
</main>

<script type="module">
  const video = document.getElementById('v'), canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
  let bEAR = 0.22, bBrow = 0.15, lastLM = null, sleepT = null, focus = 100, blinks = 0, lastE = true;

  const dist = (p1, p2) => Math.hypot(p1.x - p2.x, p1.y - p2.y);
  function getEAR(lm) {
    const v = dist(lm[160], lm[144]) + dist(lm[158], lm[153]) + dist(lm[385], lm[380]) + dist(lm[387], lm[373]);
    const h = (dist(lm[33], lm[133]) + dist(lm[362], lm[263])) * 2;
    return v / h;
  }

  window.calibrate = () => {
    if(!lastLM) return alert("لم يتم رصد وجهك بعد، تأكدي من الإضاءة");
    let s = [];
    const i = setInterval(() => {
      if(lastLM) s.push(getEAR(lastLM));
      if(s.length >= 40) { bEAR = s.reduce((a,b)=>a+b)/40; clearInterval(i); document.getElementById('h-stat').innerText = "تمت المعايرة ✅"; }
    }, 50);
  };

  function onResults(res) {
    // التحقق من الرصد
    if (!res.multiFaceLandmarks || res.multiFaceLandmarks.length === 0) {
        document.getElementById('h-stat').innerText = "❌ وجهك غير مرئي للكاميرا";
        return;
    }
    
    document.getElementById('h-stat').innerText = "✅ تم رصد الوجه";
    lastLM = res.multiFaceLandmarks[0];
    const ear = getEAR(lastLM);

    // الرمش والنوم
    if (ear < bEAR * 0.6 && lastE) lastE = false;
    else if (ear > bEAR * 0.7 && !lastE) { blinks++; document.getElementById('b-count').innerText = blinks; lastE = true; }

    if (ear < bEAR * 0.55) {
      if (!sleepT) sleepT = Date.now();
      if (Date.now() - sleepT > 5000) document.getElementById('emergency').style.display = 'flex';
    } else { sleepT = null; document.getElementById('emergency').style.display = 'none'; }

    // الملامح
    const bG = dist(lastLM[52], lastLM[282]), mH = dist(lastLM[13], lastLM[14]);
    if (bG < bBrow * 0.9) { document.getElementById('m-label').innerText = "تركيز عميق (تقطيب)"; }
    else if (mH > 0.05) { document.getElementById('m-label').innerText = "ملل (تثاؤب/ارتخاء)"; }
    else { document.getElementById('m-label').innerText = "وضعية طبيعية"; }

    // الرسم
    ctx.save(); ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(res.image, 0, 0, canvas.width, canvas.height);
    drawConnectors(ctx, lastLM, FACEMESH_TESSELATION, {color: '#6366f130', lineWidth: 1});
    ctx.restore();
  }

  window.stopA = () => { sleepT = null; document.getElementById('emergency').style.display = 'none'; };

  const faceMesh = new FaceMesh({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
  faceMesh.setOptions({maxNumFaces:1, refineLandmarks:true, minDetectionConfidence:0.3, minTrackingConfidence:0.3});
  faceMesh.onResults(onResults);

  const cam = new Camera(video, {onFrame: async () => { await faceMesh.send({image: video}); }, width: 640, height: 480});
  cam.start();
</script>
</body>
</html>
