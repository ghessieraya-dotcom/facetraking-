<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Final Camera Test</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <style>
    body { font-family: sans-serif; text-align: center; background: #1a1a1a; color: white; padding: 20px; }
    #video { border: 4px solid #333; border-radius: 10px; width: 100%; max-width: 400px; height: auto; }
    #status { margin: 20px; padding: 15px; background: #222; border-radius: 8px; font-weight: bold; }
    .error { color: #ff4d4d; border: 1px solid #ff4d4d; }
    .success { color: #00ff88; }
  </style>
</head>
<body>

  <h2>Step 1: Check Camera</h2>
  <div id="status">Initializing...</div>
  
  <video id="video" preload autoplay loop muted playsinline></video>

  <script>
    window.onload = function() {
      var status = document.getElementById('status');
      
      // Check if tracking.js loaded correctly
      if (typeof tracking === 'undefined') {
        status.className = 'error';
        status.innerText = "CRITICAL ERROR: tracking-min.js not found in this folder!";
        return;
      }

      try {
     var tracker = new tracking.ObjectTracker('face');

// زيادة حساسية الكشف
tracker.setInitialScale(4);
tracker.setStepSize(2);
tracker.setEdgesDensity(0.1);

tracker.on('track', function(event) {
    if (event.data.length > 0) {
        status.innerText = "SUCCESS: Face Detected!";
        status.className = "success";
        
        // رسم مربع حول الوجه (اختياري للتأكد)
        event.data.forEach(function(rect) {
            console.log("Face found at: " + rect.x + "," + rect.y);
        });
    } else {
        status.innerText = "Scanning... Try more light or moving back.";
        status.className = "";
    }
});

// تشغيل الكاميرا
tracking.track('#video', tracker, { camera: true });
      } catch (err) {
        status.innerText = "Error: " + err.message;
      }
    };
  </script>
</body>
</html>
