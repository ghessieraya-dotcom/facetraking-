

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <title>مختبر آية للتحقق من الميزات v12</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
  <style>
    :root { --accent: #6366f1; --bg: #020617; --card: #0f172a; --success: #10b981; --warning: #f59e0b; --danger: #ef4444; }
    body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    
    /* لوحة التحقق العلوي */
    #test-panel { background: var(--card); padding: 15px; border-bottom: 2px solid var(--accent); display: flex; gap: 15px; flex-wrap: wrap; z-index: 100; }
    .test-box { background: #1e293b; padding: 10px; border-radius: 8px; border: 1px solid #334155; flex: 1; min-width: 180px; }
    .status-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-left: 8px; vertical-align: middle; }
    
    /* الألوان الديناميكية للتحقق */
    .bg-active { background: var(--success); box-shadow: 0 0 10px var(--success); }
    .bg-inactive { background: #334155; }
    .bg-alert { background: var(--danger); box-shadow: 0 0 10px var(--danger); }

    /* منطقة العرض والكاميرا */
    #display-container { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; background: #000; }
    video, canvas { position: absolute; width: auto; height: 90%; border-radius: 15px; transform: scaleX(-1); border: 3px solid var(--accent); }
    
    /* شريط المعايرة الأخضر */
    #calib-bar-container { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 80%; max-width: 500px; height: 15px; background: #334155; border-radius: 10px; overflow: hidden; display: none; z-index: 200; }
    #calib-bar-fill { width: 0%; height: 100%; background: var(--success); transition: width 0.1s linear; }

    #alarm { display: none; position: fixed; inset: 0; z-index: 1000; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.9); }
    button { padding: 12px 24px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; background: var(--accent); color: white; transition: 0.3s; margin-top: 10px; }
  </style>
</head>
<body>

<header id="test-panel">
  <div class="test-box">
    <div style="font-size:0.8rem; color:#94a3b8;">عداد الرمش (العين)</div>
    <div style="display:flex; align-items:center; gap:10px;">
      <div id="dot-blink" class="status-dot bg-inactive"></div>
      <div id="blink-val" style="font-size:2rem; font-weight:bold;">0</div>
    </div>
  </div>

  <div class="test-box">
    <div style="font-size:0.8rem; color:#94a3b8;">حالة الفم (Mouth Gaze)</div>
    <div id="mouth-status" style="font-weight:bold; color:var(--accent);">بانتظار الرصد</div>
    <div id="mouth-desc" style="font-size:0.7rem; opacity:0.7;">سيتم التفريق بين الكلام والتثاؤب</div>
  </div>

  <div class="test-box">
    <div style="font-size:0.8rem; color:#94a3b8;">لغة الجسد واليد (Hands)</div>
    <div id="hand-status" style="font-weight:bold; color:var(--success);">مستقر</div>
    <div id="hand-desc" style="font-size:0.7rem; opacity:0.7;">سأرصد التفكير، الملل، والحيرة</div>
  </div>

  <div class="test-box">
    <div style="font-size:0.8rem; color:#94a3b8;">تتبع النظر (Gaze)</div>
    <div id="gaze-status" style="font-weight:bold; color:var(--success);">مركّز ✅</div>
  </div>

  <div style="display:flex; flex-direction:column; gap:5px;">
    <button onclick="startCalibration()">🎯 ابدأ المعايرة الدقيقة</button>
    <button style="background:#334155" onclick="location.reload()">🔄 إعادة ضبط</button>
  </div>
</header>

<main id="display-container">
  <video id="webcam" playsinline style="display:none;"></video>
  <canvas id="visualizer"></canvas>
  <div id="calib-bar-container"><div id="calib-bar-fill"></div></div>
  <div id="alarm">
    <h1 style="color:white; font-size:4rem; margin:0;">⚠️ آية! استيقظي 🚨</h1>
    <button style="background:white; color:red; padding:15px 40px; font-size:1.2rem;" onclick="stopAlarm()">أنا مستيقظة</button>
  </div>
</main><script type="module">
  const video = document.getElementById('webcam'), canvas = document.getElementById('visualizer'), ctx = canvas.getContext('2d');
  
  // المتغيرات المرجعية الدقيقة (للمعايرة)
  let bEAR = 0.22, bBrow = 0.15, lastLM = null;
  // عدادات
  let blinks = 0, lastE = true, sleepT = null, gazeT = null, boredT = null;
  // فلاتر الكلام
  let mouthActivity = [];
  
  const audioAlarm = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');

  const dist = (p1, p2) => Math.hypot(p1.x - p2.x, p1.y - p2.y);
  
  // دالة EAR (العين) بدقتها الكاملة
  function getEAR(lm) {
    const v = dist(lm[160], lm[144]) + dist(lm[385], lm[380]);
    const h = dist(lm[33], lm[133]) + dist(lm[362], lm[263]);
    return v / h;
  }

  // معايرة دقيقة ببار أخضر (10 ثوانٍ)
  window.startCalibration = () => {
    if(!lastLM) return alert("الوجه غير مرصود");
    let samples = [];
    const bar = document.getElementById('calib-bar-fill');
    document.getElementById('calib-bar-container').style.display = 'block';
    const interval = setInterval(() => {
      if(lastLM) samples.push({e: getEAR(lastLM), b: dist(lastLM[52], lastLM[282])});
      bar.style.width = (samples.length / 100 * 100) + "%";
      if(samples.length >= 100) {
        bEAR = samples.reduce((a,c)=>a+c.e,0)/100; bBrow = samples.reduce((a,c)=>a+c.b,0)/100;
        clearInterval(interval);
        document.getElementById('calib-bar-container').style.display = 'none';
        alert("تمت معايرة ملامحكِ بدقة ✅");
      }
    }, 100);
  };function onResults(res) {
    if (!res.multiFaceLandmarks || res.multiFaceLandmarks.length === 0) {
      if(!gazeT) gazeT = Date.now();
      if(Date.now() - gazeT > 10000) showAlarm("غياب عن المكتب ⚠️", "rgba(255,0,0,0.5)", false);
      return;
    }
    gazeT = null;
    lastLM = res.multiFaceLandmarks[0];
    const lm = lastLM;
    const now = Date.now();

    // الرسم الكامل والربط الدقيق بين النقاط
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(res.image, 0, 0, canvas.width, canvas.height);
    drawConnectors(ctx, lastLM, FACEMESH_TESSELATION, {color: '#6366f130', lineWidth: 1});

    // 1. عداد الرمش (إصلاح النقطة 160 و 144)
    const ear = getEAR(lm);
    if (ear < bEAR * 0.65 && lastE) { lastE = false; document.getElementById('dot-blink').className = "status-dot bg-alert"; }
    else if (ear > bEAR * 0.75 && !lastE) { 
        blinks++; 
        document.getElementById('blink-val').innerText = blinks; 
        document.getElementById('dot-blink').className = "status-dot bg-inactive";
        lastE = true; 
    }

    // 2. تحليل الفم الذكي (تفرقة الكلام عن التثاؤب)
    const mLabel = document.getElementById('mouth-status'), mDesc = document.getElementById('mouth-desc');
    const mH = dist(lm[13], lm[14]);
    if (mH > 0.05) {
      mouthActivity.push(now);
      mouthActivity = mouthActivity.filter(t => now - t < 2000); // مسح القديم

      if (mouthActivity.length > 5) { // حركة سريعة ومتكررة = كلام
        mLabel.innerText = "يتحدث 🗣️"; mLabel.style.color = "var(--success)"; mDesc.innerText = "رصد حركة عضلات نطق سريعة";
      } else { // فتحة مستمرة وبطيئة = تثاؤب
        if ((now - mouthActivity[0]) / 1000 > 1.5) { // تثاؤب حقيقي لأكثر من ثانية ونصف
            mLabel.innerText = "تثاؤب 🥱"; mLabel.style.color = "var(--danger)"; mDesc.innerText = "رصد شهيق عميق ومستمر";
        }
      }
    } else { mLabel.innerText = "مستقر"; mLabel.style.color = "var(--accent)"; mDesc.innerText = "عضلات الفك السفلي مسترخية"; mouthActivity = []; }

    // 3. تحليل اليد والجسد (Hands) - دقة كاملة
    const hStatus = document.getElementById('hand-status'), hDesc = document.getElementById('hand-desc');
    if (res.multiHandLandmarks && res.multiHandLandmarks.length > 0) {
        const handLM = res.multiHandLandmarks[0];
        // نقاط اليد
        const wrist = handLM[0], palmCenter = handLM[9], forehead = lastLM[10], chin = lastLM[152];
        const cheekL = lastLM[234], cheekR = lastLM[454];

        // تحليل الوضعيات
        if (dist(palmCenter, forehead) < 0.07) {
            hStatus.innerText = "حيرة / قلق 😟"; hStatus.style.color = "var(--danger)"; hDesc.innerText = "اليد على الجبهة تدل على ارتياب";
        } else if (dist(palmCenter, cheekL) < 0.07 || dist(palmCenter, cheekR) < 0.07) {
            if(!boredT) boredT = now;
            if(now - boredT > 30000) { hStatus.innerText = "ملل / إرهاق 🥱"; hStatus.style.color = "var(--warning)"; hDesc.innerText = "تم تجاوز 30 ثانية ثبات باليد"; }
        } else if (dist(palmCenter, chin) < 0.06 && dist(handLM[8], chin) < 0.03) {
            hStatus.innerText = "تفكير عميق 🤔"; hStatus.style.color = "var(--success)"; hDesc.innerText = "وضعية اليد تدل على تقييم المعلومات";
        }
        drawConnectors(ctx, handLM, HAND_CONNECTIONS, {color: '#10b981', lineWidth: 2}); // رسم اليد للتأكد من دقتها
    } else { boredT = null; hStatus.innerText = "مستقر"; hStatus.style.color = "var(--success)"; hDesc.innerText = "اليد ليست على الوجه"; }

    // 4. منبه النوم (5 ثوانٍ)
    if (ear < bEAR * 0.6) {
        if (!sleepT) sleepT = now;
        if (now - sleepT > 5000) showAlarm("آية، استيقظي! 🚨", "red", true);
    } else { sleepT = null; stopAlarm(); }

    // 5. النظر للأسفل (وضعية الكتابة المسموحة)
    if (lastLM[468].y > 0.62) document.getElementById('gaze-status').innerText = "يكتب 📝";
    else document.getElementById('gaze-status').innerText = "مركّز ✅";
  }function showAlarm(msg, color, sound) {
    const a = document.getElementById('alarm');
    a.style.display = 'flex';
    a.style.backgroundColor = color;
    a.querySelector('h1').innerText = msg;
    if(sound) audioAlarm.play();
  }
  window.stopAlarm = () => { document.getElementById('alarm').style.display = 'none'; audioAlarm.pause(); };

  // إعداد Face Mesh بدقة مفرطة
  const faceMesh = new FaceMesh({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
  faceMesh.setOptions({maxNumFaces:1, refineLandmarks:true, minDetectionConfidence:0.7});
  faceMesh.onResults(onResults);

  // إعداد Hands بدقة مفرطة
  const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
  hands.setOptions({maxNumHands:1, minDetectionConfidence:0.7});
  hands.onResults((resHands) => {
    // دمج النتائج مع Face Mesh يتم في onResults الأصلي
  });

  // التحكم في تشغيل الكاميرا وإرسال البيانات للمحركين (الأداء السلس)
  const camera = new Camera(video, {onFrame: async () => {
    // سنستخدم المعالجة المتوازنة (Balanced Processing) لضمان الأداء السلس
    await faceMesh.send({image: video});
    // تشغيل محرك اليد بنفس الوقت لتسريع المعالجة
    setTimeout(()=> hands.send({image: video}), 2);
  }, width: 1280, height: 720}); // جودة عالية HD
  camera.start();
</script>
</body>
</html>
