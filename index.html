<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <title>نظام آية Ghesseier v28 - المحلل النفسي للطالب</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <style>
    :root { --accent: #8b5cf6; --bg: #020617; --card: #0f172a; --danger: #ef4444; --success: #10b981; }
    body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; height: 100vh; overflow: hidden; }
    
    /* لوحة التحكم الجانبية */
    #side-panel { width: 350px; background: var(--card); padding: 25px; border-left: 3px solid var(--accent); display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }
    #viewport { flex: 1; position: relative; background: #000; }
    canvas { width: 100%; height: 100%; transform: scaleX(-1); object-fit: contain; }
    video { display: none; }

    /* بطاقات الحالة */
    .stat-card { background: #1e293b; padding: 15px; border-radius: 12px; border-right: 5px solid #334155; transition: 0.3s; }
    .stat-card.active { border-right-color: var(--accent); background: rgba(139, 92, 246, 0.1); }
    .label { font-size: 0.85rem; color: #94a3b8; }
    .value { font-size: 1.2rem; font-weight: bold; margin-top: 5px; }

    /* منبه الحالة النفسية */
    #mental-state { font-size: 1.5rem; text-align: center; padding: 20px; border-radius: 15px; background: #1e293b; border: 2px solid var(--accent); margin-top: 10px; color: var(--success); }
    
    #start-btn { position: fixed; inset: 0; z-index: 9999; background: var(--bg); display: flex; justify-content: center; align-items: center; }
    button.main { padding: 20px 60px; background: var(--accent); color: white; border: none; border-radius: 50px; font-size: 1.5rem; cursor: pointer; box-shadow: 0 0 30px rgba(139, 92, 246, 0.4); }
  </style>
</head>
<body>

<div id="start-btn"><button class="main" onclick="startSystem()">تشغيل نظام تحليل الطالب v28 🚀</button></div>

<aside id="side-panel">
  <h2 style="color:var(--accent); text-align:center; margin-bottom:20px;">تحليل سلوك الطالب</h2>
  
  <div id="mental-state">جاري التحليل...</div>

  <div class="stat-card" id="card-blink">
    <div class="label">عداد الرمش (تركيز الطالب)</div>
    <div id="blink-val" class="value">0</div>
  </div>

  <div class="stat-card" id="card-brow">
    <div class="label">الحواجب (تعجب/تركيز)</div>
    <div id="brow-val" class="value">طبيعي</div>
  </div>

  <div class="stat-card" id="card-mouth">
    <div class="label">نشاط الفم (كلام/تثاؤب)</div>
    <div id="mouth-val" class="value">صامت</div>
  </div>

  <div class="stat-card">
    <div class="label">التتبع البصري</div>
    <div id="vision-val" class="value">مركّز على الشاشة</div>
  </div>

  <button onclick="location.reload()" style="background:#334155; margin-top:auto;">إعادة مزامنة النظام 🔄</button>
</aside>

<main id="viewport">
  <video id="input_video"></video>
  <canvas id="output_canvas"></canvas>
</main>

<script type="module">
  const video = document.getElementById('input_video'), canvas = document.getElementById('output_canvas'), ctx = canvas.getContext('2d');
  let blinks = 0, isClosed = false, faceRes = null;
  let bEAR = 0.22, bBrow = 0.05, bMouth = 0.02, calibrated = false, frames = 0;

  const faceMesh = new FaceMesh({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
  faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
  faceMesh.onResults(res => { faceRes = (res.multiFaceLandmarks) ? res.multiFaceLandmarks[0] : null; });

  const dist = (p1, p2) => Math.hypot(p1.x - p2.x, p1.y - p2.y);

  window.startSystem = () => {
    document.getElementById('start-btn').style.display = 'none';
    const camera = new Camera(video, {
      onFrame: async () => {
        await faceMesh.send({image: video});
        draw();
      },
      width: 640, height: 480
    });
    camera.start();
  };

  function draw() {
    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
    ctx.save();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    if (faceRes) {
      const lm = faceRes;
      drawConnectors(ctx, lm, FACEMESH_TESSELATION, {color: '#ffffff20', lineWidth: 0.5});
      
      // 1. حساب القياسات الحيوية
      const cEAR = (dist(lm[159], lm[145]) + dist(lm[386], lm[374])) / (2 * dist(lm[33], lm[133]));
      const cBrow = (dist(lm[105], lm[159]) + dist(lm[334], lm[386])) / 2;
      const cMouth = dist(lm[13], lm[14]);

      // 2. المعايرة التلقائية (أول ثانية)
      if (!calibrated && frames < 30) {
        bEAR = cEAR; bBrow = cBrow; bMouth = cMouth;
        frames++; if(frames === 30) calibrated = true;
      }

      if (calibrated) {
        // --- تحليل الرمش ---
        if (cEAR < bEAR * 0.75) isClosed = true;
        else if (isClosed && cEAR > bEAR * 0.85) { blinks++; isClosed = false; document.getElementById('blink-val').innerText = blinks; }

        // --- تحليل التعجب والحواجب ---
        let browState = "طبيعي";
        if (cBrow > bBrow * 1.3) { browState = "تعجب 😲"; document.getElementById('card-brow').classList.add('active'); }
        else if (cBrow < bBrow * 0.8) { browState = "تركيز/تفكير 😠"; document.getElementById('card-brow').classList.add('active'); }
        else { document.getElementById('card-brow').classList.remove('active'); }
        document.getElementById('brow-val').innerText = browState;

        // --- تحليل الفم ---
        let mouthState = "صامت";
        if (cMouth > bMouth + 0.05) { mouthState = "تثاؤب 🥱"; document.getElementById('card-mouth').classList.add('active'); }
        else if (cMouth > bMouth + 0.015) { mouthState = "يتحدث 🗣️"; document.getElementById('card-mouth').classList.add('active'); }
        else { document.getElementById('card-mouth').classList.remove('active'); }
        document.getElementById('mouth-val').innerText = mouthState;

        // --- محرك الذكاء النفسي (دمج المعطيات) ---
        const stateBox = document.getElementById('mental-state');
        
        if (mouthState === "تثاؤب 🥱") {
            stateBox.innerText = "الحالة: يشعر بالملل 💤"; stateBox.style.color = "#f59e0b";
        } else if (browState === "تعجب 😲" && mouthState === "صامت") {
            stateBox.innerText = "الحالة: غير فاهم / مندهش 🧐"; stateBox.style.color = "#ef4444";
        } else if (browState === "تركيز/تفكير 😠") {
            stateBox.innerText = "الحالة: حماس وتركيز عالي 🔥"; stateBox.style.color = "#10b981";
        } else if (lm[1].y > 0.6) {
            stateBox.innerText = "الحالة: منشغل بالكتابة 📝"; stateBox.style.color = "#3b82f6";
        } else {
            stateBox.innerText = "الحالة: متابع جيد ✅"; stateBox.style.color = "#10b981";
        }
      }
    }
    ctx.restore();
  }
</script>
</body>
</html>
