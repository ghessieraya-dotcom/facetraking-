<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Private Study Assistant - Test</title>
  <script src="tracking-min.js"></script>
  <script src="data/face-min.js"></script>
  <style>
    body { font-family: sans-serif; text-align: center; background: #1a1a1a; color: white; padding-top: 50px; }
    #video { border: 5px solid #333; border-radius: 15px; background: #000; }
    #status-box { 
      margin: 20px auto; width: 300px; padding: 15px; 
      border-radius: 10px; background: #222; font-weight: bold; 
    }
    .searching { color: #ffcc00; }
    .found { color: #00ff88; }
  </style>
</head>
<body>

  <h1>Assistant Camera Test</h1>
  <div id="status-box" class="searching">Status: Initializing Camera...</div>
  
  <video id="video" width="400" height="300" preload autoplay loop muted playsinline></video>

  <script>
    window.onload = function() {
      var status = document.getElementById('status-box');
      
      try {
        // Initialize the tracker
        var tracker = new tracking.ObjectTracker('face');
        tracker.setInitialScale(4);
        tracker.setStepSize(2);
        tracker.setEdgesDensity(0.1);

        // Start the camera
        tracking.track('#video', tracker, { camera: true });

        tracker.on('track', function(event) {
          if (event.data.length > 0) {
            status.innerText = "STATUS: STUDENT DETECTED";
            status.className = "found";
          } else {
            status.innerText = "STATUS: SEARCHING...";
            status.className = "searching";
          }
        });

      } catch (err) {
        status.innerText = "ERROR: " + err.message;
        status.style.color = "red";
      }
    };
  </script>
</body>
</html>
