
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <title>مختبر آية المطور - v12.1</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  
  <style>
    :root { --accent: #6366f1; --bg: #020617; --card: #0f172a; --success: #10b981; --danger: #ef4444; }
    body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    #test-panel { background: var(--card); padding: 15px; border-bottom: 2px solid var(--accent); display: flex; gap: 10px; z-index: 100; justify-content: center; }
    .test-box { background: #1e293b; padding: 10px; border-radius: 8px; min-width: 150px; text-align: center; border: 1px solid #334155; }
    #display-container { flex: 1; position: relative; background: #000; display: flex; justify-content: center; align-items: center; }
    video, canvas { position: absolute; width: 100%; height: 100%; object-fit: contain; transform: scaleX(-1); }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; background: #334155; transition: 0.3s; }
    .active-dot { background: var(--success); box-shadow: 0 0 10px var(--success); }
    #loading-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; justify-content: center; align-items: center; font-size: 1.5rem; }
  </style>
</head>
<body>

<div id="loading-overlay">جاري تحضير المحرك الذكي... يرجى الانتظار ⏳</div>

<header id="test-panel">
  <div class="test-box">
    <div style="font-size:0.7rem;">عداد الرمش</div>
    <div id="blink-val" style="font-size:1.5rem; font-weight:bold;">0</div>
    <div id="dot-blink" class="status-dot"></div>
  </div>
  <div class="test-box">
    <div style="font-size:0.7rem;">الحالة الحالية</div>
    <div id="status-text" style="font-weight:bold; color:var(--success);">جاري التحليل...</div>
  </div>
  <button onclick="startCalibration()" style="background:var(--accent); color:white; border:none; padding:10px; border-radius:5px; cursor:pointer;">🎯 معايرة</button>
</aside>

<main id="display-container">
  <video id="input_video" style="display:none;"></video>
  <canvas id="output_canvas"></canvas>
</main>

<script type="module">
  const videoElement = document.getElementById('input_video');
  const canvasElement = document.getElementById('output_canvas');
  const canvasCtx = canvasElement.getContext('2d');
  
  let bEAR = 0.22, blinks = 0, lastE = true;
  let lastFaceResults = null;

  function dist(p1, p2) { return Math.hypot(p1.x - p2.x, p1.y - p2.y); }

  // دالة EAR المحدثة لزيادة الحساسية
  function getEAR(lm) {
    const v = dist(lm[159], lm[145]) + dist(lm[386], lm[374]);
    const h = dist(lm[33], lm[133]) + dist(lm[362], lm[263]);
    return v / (2 * h);
  }

  function onResults(faceRes, handRes) {
    // إخفاء شاشة التحميل عند أول نتيجة
    document.getElementById('loading-overlay').style.display = 'none';

    canvasCtx.save();
    canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
    
    // رسم الفيديو الأصلي
    canvasCtx.drawImage(faceRes.image, 0, 0, canvasElement.width, canvasElement.height);

    if (faceRes.multiFaceLandmarks && faceRes.multiFaceLandmarks.length > 0) {
      const lm = faceRes.multiFaceLandmarks[0];
      
      // 1. منطق الرمش
      const ear = getEAR(lm);
      if (ear < bEAR * 0.7) { 
        if(lastE) {
          document.getElementById('dot-blink').classList.add('active-dot');
          lastE = false; 
        }
      } else {
        if(!lastE) {
          blinks++;
          document.getElementById('blink-val').innerText = blinks;
          document.getElementById('dot-blink').classList.remove('active-dot');
          lastE = true;
        }
      }

      // 2. وضعية الكتابة
      if (lm[468].y > 0.65) {
        document.getElementById('status-text').innerText = "يكتب الآن 📝";
      } else {
        document.getElementById('status-text').innerText = "مركّز ✅";
      }

      // رسم الشبكة بدقة كاملة
      drawConnectors(canvasCtx, lm, FACEMESH_TESSELATION, {color: '#C0C0C070', lineWidth: 1});
    }

    // 3. رسم اليد وتحليلها إذا وجدت
    if (handRes && handRes.multiHandLandmarks) {
      for (const landmarks of handRes.multiHandLandmarks) {
        drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#00FF00', lineWidth: 2});
        // رصد اليد القريبة من الوجه
        if (dist(landmarks[9], faceRes.multiFaceLandmarks[0][152]) < 0.1) {
            document.getElementById('status-text').innerText = "تفكير / ملل 🤔";
        }
      }
    }
    canvasCtx.restore();
  }

  // إعداد المحركات بشكل متوازي لضمان السرعة
  const faceMesh = new FaceMesh({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
  faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });

  const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
  hands.setOptions({ maxNumHands: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });

  // دالة المعايرة
  window.startCalibration = () => {
    blinks = 0; document.getElementById('blink-val').innerText = "0";
    alert("سيتم تصفير العداد والمعايرة الآن. ابقِ عينكِ مفتوحة.");
  };

  // الحل الجذري لمشكلة "عدم تشغيل الفيديو": الربط المتزامن
  const camera = new Camera(videoElement, {
    onFrame: async () => {
      // إرسال الإطار للمحركين وانتظار النتائج معاً
      const faceResults = await new Promise(resolve => {
        faceMesh.onResults(results => resolve(results));
        faceMesh.send({image: videoElement});
      });
      
      const handResults = await new Promise(resolve => {
        hands.onResults(results => resolve(results));
        hands.send({image: videoElement});
      });

      onResults(faceResults, handResults);
    },
    width: 1280,
    height: 720
  });

  camera.start().catch(err => {
    document.getElementById('loading-overlay').innerText = "خطأ: لم نتمكن من الوصول للكاميرا. يرجى السماح للمتصفح.";
    console.error(err);
  });
</script>
</body>
</html>
