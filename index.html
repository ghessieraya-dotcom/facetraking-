<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <title>مساعد الدراسة الذكي - النسخة الاحترافية</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

  <style>
    body { margin: 0; background: #0f172a; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
    
    /* لوحة التحليل العلوية */
    #analysis-panel {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(30, 41, 59, 0.85); backdrop-filter: blur(12px);
      padding: 15px 35px; border-radius: 50px; border: 2px solid rgba(255,255,255,0.1);
      display: flex; align-items: center; gap: 20px; z-index: 100; transition: 0.5s;
    }

    #blink-badge { background: #3b82f6; padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
    #status-emoji { font-size: 1.8rem; }
    #status-text { font-weight: 600; font-size: 1.1rem; min-width: 150px; }

    .controls { position: fixed; bottom: 30px; width: 100%; text-align: center; z-index: 100; }
    #progress-container { width: 250px; height: 8px; background: #334155; margin: 10px auto; display: none; border-radius: 10px; overflow: hidden; }
    #progress-bar { height: 100%; background: #10b981; width: 0%; transition: width 0.1s; }

    button { 
      background: #3b82f6; border: none; color: white; padding: 14px 28px; 
      border-radius: 15px; cursor: pointer; font-weight: 600; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    
    .view { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
    video, canvas { position: absolute; width: 85%; max-width: 750px; border-radius: 30px; transform: scaleX(-1); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
    
    #overlay-alarm {
      display: none; position: fixed; inset: 0; background: rgba(153, 27, 27, 0.95);
      z-index: 1000; flex-direction: column; justify-content: center; align-items: center; text-align: center;
    }
  </style>
</head>

<body>
  <div id="analysis-panel">
    <div id="blink-badge">الرمشات: <span id="blink-count">0</span></div>
    <span id="status-emoji">⏳</span>
    <span id="status-text">جاري التحليل...</span>
  </div>

  <div id="overlay-alarm">
    <h1 style="font-size: 5rem; margin: 0;">😴 أووو! أنتِ نائمة!</h1>
    <p style="font-size: 1.8rem;">استيقظي فوراً، حصتكِ لم تنتهِ بعد!</p>
  </div>

  <div class="view">
    <video id="input_video"></video>
    <canvas id="output_canvas"></canvas>
  </div>

  <div class="controls">
    <button id="calibBtn" onclick="startCalibration()">🎯 ضبط البصمة الشخصية (المعايرة)</button>
    <div id="progress-container"><div id="progress-bar"></div></div>
  </div>

  <script type="module">
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const statusEmoji = document.getElementById('status-emoji');
    const statusText = document.getElementById('status-text');
    const blinkDisplay = document.getElementById('blink-count');
    const overlay = document.getElementById('overlay-alarm');

    // متغيرات المعايرة والتحليل
    let baseEAR = 0.25;
    let baseBrowDist = 0.14;
    let currentEAR = 0;
    let isCalibrating = false;
    
    // متغيرات الرمش (Blink Detection)
    let blinkCount = 0;
    let lastEyeStateOpen = true; 
    let lastBlinkTime = 0;

    // متغيرات الاستقرار (Anti-Flicker)
    let lastStableStatus = { emoji: "📖", text: "بدء الدراسة" };
    let statusCounter = 0;
    let pendingStatus = null;
    let sleepTimer = null;

    function getDistance(p1, p2) {
      return Math.hypot(p1.x - p2.x, p1.y - p2.y);
    }

    // --- المعايرة مع شريط التقدم ---
    window.startCalibration = function() {
      if (isCalibrating) return;
      isCalibrating = true;
      document.getElementById('progress-container').style.display = 'block';
      document.getElementById('calibBtn').style.display = 'none';
      let samplesEAR = [];
      let samplesBrow = [];

      const interval = setInterval(() => {
        if (currentEAR > 0) {
          samplesEAR.push(currentEAR);
          const landmarks = window.lastLandmarks;
          samplesBrow.push(getDistance(landmarks[52], landmarks[282]));
          document.getElementById('progress-bar').style.width = (samplesEAR.length / 40 * 100) + '%';
        }
        if (samplesEAR.length >= 40) {
          clearInterval(interval);
          baseEAR = samplesEAR.reduce((a,b)=>a+b)/40;
          baseBrowDist = samplesBrow.reduce((a,b)=>a+b)/40;
          isCalibrating = false;
          document.getElementById('progress-container').style.display = 'none';
          document.getElementById('calibBtn').style.display = 'inline-block';
          document.getElementById('calibBtn').innerText = "✅ تم التحديث";
          alert("رائع! النظام الآن يعرف ملامحكِ الخاصة.");
        }
      }, 100);
    };

    // --- نظام عد الرمشات ---
    function detectBlinks(ear) {
      const threshold = baseEAR * 0.7;
      if (ear < threshold && lastEyeStateOpen) {
        lastEyeStateOpen = false; // العين انغلقت الآن
        lastBlinkTime = Date.now();
      } else if (ear >= threshold && !lastEyeStateOpen) {
        // العين انفتحت الآن.. هل كانت رمشة سريعة؟
        const duration = Date.now() - lastBlinkTime;
        if (duration < 400) { // الرمشة الحقيقية أقل من 400ms
           blinkCount++;
           blinkDisplay.innerText = blinkCount;
        }
        lastEyeStateOpen = true;
      }
    }

    // --- نظام استقرار الحالة (المنع من التشتت) ---
    function updateStatus(newStatus) {
      if (newStatus.text === lastStableStatus.text) {
        statusCounter = 0;
        return;
      }
      if (newStatus.text.includes("نوم")) { // النوم يظهر فوراً
        applyStatus(newStatus);
        return;
      }
      if (pendingStatus && newStatus.text === pendingStatus.text) {
        statusCounter++;
        if (statusCounter > 20) { // يجب ثبات الحالة لـ 20 إطاراً (حوالي ثانية)
          applyStatus(newStatus);
          statusCounter = 0;
        }
      } else {
        pendingStatus = newStatus;
        statusCounter = 0;
      }
    }

    function applyStatus(status) {
      lastStableStatus = status;
      statusEmoji.innerText = status.emoji;
      statusText.innerText = status.text;
      document.getElementById('analysis-panel').style.borderColor = status.color || "rgba(255,255,255,0.1)";
    }

    function onResults(results) {
      canvasCtx.save();
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
      
      if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
        const landmarks = results.multiFaceLandmarks[0];
        window.lastLandmarks = landmarks;

        // حساب القياسات الأساسية
        const leftEAR = (getDistance(landmarks[160], landmarks[144]) + getDistance(landmarks[158], landmarks[153])) / (2 * getDistance(landmarks[33], landmarks[133]));
        const rightEAR = (getDistance(landmarks[385], landmarks[380]) + getDistance(landmarks[387], landmarks[373])) / (2 * getDistance(landmarks[362], landmarks[263]));
        currentEAR = (leftEAR + rightEAR) / 2;

        const browDist = getDistance(landmarks[52], landmarks[282]);
        const mouthOpen = landmarks[14].y - landmarks[13].y;

        // 1. تفعيل عداد الرمش
        detectBlinks(currentEAR);

        // 2. تحليل الحالة النفسية والتركيز
        let currentStatus = { emoji: "📖", text: "دراسة مستقرة", color: "rgba(255,255,255,0.1)" };

        if (currentEAR < baseEAR * 0.6) {
          if (!sleepTimer) sleepTimer = Date.now();
          if (Date.now() - sleepTimer > 2000) { // تأكيد النوم بعد ثانيتين
             currentStatus = { emoji: "😴", text: "نوم مكتشف!", color: "#ef4444" };
             overlay.style.display = "flex";
          }
        } else {
          overlay.style.display = "none";
          sleepTimer = null;

          // تحليل الحواجب (تركيز vs حيرة)
          if (browDist < baseBrowDist * 0.88) {
             currentStatus = { emoji: "🔥", text: "تركيز عميق جداً", color: "#10b981" };
          } else if (browDist > baseBrowDist * 1.18) {
             currentStatus = { emoji: "❓", text: "تبدين حائرة.. هل الفكرة صعبة؟", color: "#f59e0b" };
          } else if (mouthOpen > 0.06) {
             currentStatus = { emoji: "🥱", text: "تعب / تثاؤب ملحوظ", color: "#8b5cf6" };
          }
        }

        updateStatus(currentStatus);
        
        // رسم شبكة خفيفة جداً لعدم إزعاج العين
        drawConnectors(canvasCtx, landmarks, FACEMESH_TESSELATION, {color: '#ffffff10', lineWidth: 1});
      }
      canvasCtx.restore();
    }

    const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
    faceMesh.setOptions({maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6});
    faceMesh.onResults(onResults);

    const camera = new Camera(videoElement, {
      onFrame: async () => { await faceMesh.send({image: videoElement}); },
      width: 640, height: 480
    });
    camera.start();
  </script>
</body>
</html>
