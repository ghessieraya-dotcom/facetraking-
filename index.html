
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <title>Aya AI - Fixed Connection</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <style>
    body { margin: 0; background: #020617; color: white; font-family: sans-serif; overflow: hidden; }
    #status-layer { position: fixed; top: 0; width: 100%; background: rgba(15, 23, 42, 0.9); padding: 15px; z-index: 100; text-align: center; border-bottom: 2px solid #6366f1; }
    #video-wrapper { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
    video, canvas { position: absolute; width: 90%; max-width: 600px; border-radius: 20px; transform: scaleX(-1); }
    canvas { z-index: 10; }
    #alarm-screen { display: none; position: fixed; inset: 0; background: #7f1d1d; z-index: 1000; flex-direction: column; justify-content: center; align-items: center; }
    .btn { padding: 12px 25px; border-radius: 10px; border: none; background: #6366f1; color: white; cursor: pointer; margin: 5px; font-weight: bold; }
  </style>
</head>
<body>

<div id="status-layer">
  <h3 id="main-msg">جاري الاتصال بخوادم الذكاء الاصطناعي...</h3>
  <p id="sub-msg" style="font-size: 0.8rem; color: #94a3b8;">يرجى الانتظار 10 ثوانٍ لتحميل المكتبات</p>
  <button class="btn" onclick="manualCalibrate()">🎯 اضغطي هنا للمعايرة</button>
</div>

<div id="video-wrapper">
  <video id="webcam" playsinline style="opacity: 0.3;"></video>
  <canvas id="visualizer"></canvas>
</div>

<div id="alarm-screen">
  <h1 style="font-size: 3rem;">⚠️ آية! استيقظي!</h1>
  <button class="btn" style="background: white; color: red;" onclick="resetAlarm()">أنا مستيقظة</button>
</div>

<script type="module">
  const video = document.getElementById('webcam');
  const canvas = document.getElementById('visualizer');
  const ctx = canvas.getContext('2d');
  const mainMsg = document.getElementById('main-msg');
  const subMsg = document.getElementById('sub-msg');

  let bEAR = 0.22, lastLM = null, sleepT = null, lastE = true;

  // دالة قياس العين
  const dist = (p1, p2) => Math.hypot(p1.x - p2.x, p1.y - p2.y);
  function getEAR(lm) {
    const v = dist(lm[160], lm[144]) + dist(lm[385], lm[380]);
    const h = dist(lm[33], lm[133]) + dist(lm[362], lm[263]);
    return v / h;
  }

  // معايرة يدوية
  window.manualCalibrate = () => {
    if(!lastLM) return alert("النظام لم يرصد وجهك بعد. تأكدي من ظهور الخطوط على وجهك.");
    bEAR = getEAR(lastLM);
    mainMsg.innerText = "تمت المعايرة بنجاح ✅";
    subMsg.innerText = "النظام يراقبكِ الآن بدقة.";
  };

  function onResults(results) {
    if (!results.multiFaceLandmarks || results.multiFaceLandmarks.length === 0) {
      mainMsg.innerText = "❌ وجهكِ غير واضح";
      return;
    }

    mainMsg.innerText = "✅ وجهكِ مرصود (جاهز)";
    lastLM = results.multiFaceLandmarks[0];
    const ear = getEAR(lastLM);

    // كشف النوم 5 ثوانٍ
    if (ear < bEAR * 0.65) {
      if (!sleepT) sleepT = Date.now();
      if (Date.now() - sleepT > 5000) document.getElementById('alarm-screen').style.display = 'flex';
    } else { sleepT = null; }

    // رسم الشبكة للتأكد من العمل
    ctx.save();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
    if(lastLM) {
        drawConnectors(ctx, lastLM, FACEMESH_TESSELATION, {color: '#6366f150', lineWidth: 1});
    }
    ctx.restore();
  }

  window.resetAlarm = () => { sleepT = null; document.getElementById('alarm-screen').style.display = 'none'; };

  // إعداد المحرك
  const faceMesh = new FaceMesh({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
  });

  faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
  faceMesh.onResults(onResults);

  // تشغيل الكاميرا بطريقة الهاتف
  const camera = new Camera(video, {
    onFrame: async () => { await faceMesh.send({image: video}); },
    width: 640, height: 480
  });

  camera.start().then(() => {
    subMsg.innerText = "الكاميرا تعمل.. بانتظار تحميل نموذج الوجه...";
  }).catch(err => {
    mainMsg.innerText = "⚠️ خطأ في الكاميرا";
    subMsg.innerText = "تأكدي من إعطاء الإذن للمتصفح.";
  });
</script>
</body>
</html>
