<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <title>نظام آية التحليلي v10</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
  <style>
    :root { --accent: #818cf8; --bg: #020617; --card: #0f172a; --success: #10b981; --warning: #f59e0b; --danger: #ef4444; }
    body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; }
    
    #side-panel { width: 350px; background: var(--card); padding: 20px; border-left: 1px solid #1e293b; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
    .monitor-box { background: #1e293b; padding: 12px; border-radius: 10px; border-right: 4px solid var(--accent); }
    .status-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-left: 8px; }
    .bg-success { background: var(--success); box-shadow: 0 0 8px var(--success); }
    .bg-warning { background: var(--warning); box-shadow: 0 0 8px var(--warning); }
    .bg-danger { background: var(--danger); box-shadow: 0 0 8px var(--danger); }

    #display { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; }
    video, canvas { position: absolute; width: 90%; max-width: 650px; border-radius: 20px; transform: scaleX(-1); }
    
    #alarm { display: none; position: fixed; inset: 0; z-index: 1000; flex-direction: column; justify-content: center; align-items: center; transition: 0.5s; }
    .btn { padding: 12px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
  </style>
</head>
<body><aside id="side-panel">
  <h3 style="text-align:center; color:var(--accent);">AYA ANALYTICS V10</h3>
  
  <div class="monitor-box">
    <div class="stat-label"><span id="dot-eye" class="status-dot"></span> حالة العين</div>
    <div id="eye-text" style="font-weight:bold;">مستقر</div>
  </div>

  <div class="monitor-box">
    <div class="stat-label"><span id="dot-hand" class="status-dot"></span> تحليل اليد والجسد</div>
    <div id="hand-text" style="font-weight:bold;">لا يوجد يد</div>
  </div>

  <div class="monitor-box">
    <div class="stat-label"><span id="dot-focus" class="status-dot"></span> مؤشر السلوك</div>
    <div id="focus-text" style="font-weight:bold;">بانتظار الحركة</div>
    <div id="timer-info" style="font-size:0.7rem; color:#94a3b8;"></div>
  </div>

  <button class="btn" onclick="startCalibration()">🎯 معايرة (60 ثانية)</button>
  <button class="btn" style="background:#334155" onclick="location.reload()">🔄 إعادة تشغيل</button>
</aside>

<main id="display">
  <video id="webcam" playsinline style="display:none;"></video>
  <canvas id="visualizer"></canvas>
  <div id="alarm">
    <h1 style="color:white; font-size:3rem; text-shadow: 2px 2px 10px black;">تنبيه!</h1>
    <button class="btn" style="background:white; color:black; padding:15px 40px;" onclick="stopAlarm()">أنا هنا</button>
  </div>
</main><script type="module">
  const video = document.getElementById('webcam'), canvas = document.getElementById('visualizer'), ctx = canvas.getContext('2d');
  let bEAR = 0.22, bBrow = 0.15, lastLM = null, lastHand = null;
  let timers = { sleep: null, absence: null, boredom: null, writing: null };
  const audioAlarm = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');

  const dist = (p1, p2) => Math.hypot(p1.x - p2.x, p1.y - p2.y);
  function getEAR(lm) {
    const v = dist(lm[160], lm[144]) + dist(lm[385], lm[380]);
    const h = dist(lm[33], lm[133]) + dist(lm[362], lm[263]);
    return v / h;
  }

  // --- المعايرة ---
  window.startCalibration = () => {
    let s = [];
    const int = setInterval(() => {
      if(lastLM) s.push({e: getEAR(lastLM), b: dist(lastLM[52], lastLM[282])});
      if(s.length >= 100) {
        bEAR = s.reduce((a,c)=>a+c.e,0)/100; bBrow = s.reduce((a,c)=>a+c.b,0)/100;
        clearInterval(int); alert("تمت المعايرة بنجاح ✅");
      }
    }, 30);
  };

  function onResults(res) {
    const now = Date.now();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(res.image, 0, 0, canvas.width, canvas.height);

    // 1. رصد الغياب (10 ثوانٍ - بصري فقط)
    if (!res.multiFaceLandmarks || res.multiFaceLandmarks.length === 0) {
      if (!timers.absence) timers.absence = now;
      if (now - timers.absence > 10000) triggerAlarm("غياب عن الشاشة ⚠️", "rgba(255,0,0,0.4)", false);
      return;
    } 
    stopAlarm(); timers.absence = null;
    lastLM = res.multiFaceLandmarks[0];

    // 2. رصد النوم (5 ثوانٍ - بصري + صوتي)
    const ear = getEAR(lastLM);
    if (ear < bEAR * 0.6) {
      if (!timers.sleep) timers.sleep = now;
      if (now - timers.sleep > 5000) triggerAlarm("استيقظي يا آية! 🚨", "red", true);
    } else { timers.sleep = null; }

    // 3. رصد اليد والملل (30 ثانية)
    let handOnCheek = false;
    if (res.multiHandLandmarks && res.multiHandLandmarks.length > 0) {
      const h = res.multiHandLandmarks[0];
      const distHandCheek = dist(h[9], lastLM[234]); // المسافة بين راحة اليد والخد
      if (distHandCheek < 0.07) {
        handOnCheek = true;
        if (!timers.boredom) timers.boredom = now;
        let elapsed = Math.floor((now - timers.boredom)/1000);
        document.getElementById('timer-info').innerText = `مؤقت الثبات: ${elapsed}s / 30s`;
        if (elapsed > 30) updateUI('hand', "ملل مستمر 🥱", "bg-warning");
        else updateUI('hand', "وضعية مريحة", "bg-success");
      }
    }
    if (!handOnCheek) { timers.boredom = null; updateUI('hand', "طبيعي", "bg-success"); }

    // 4. مقومات التركيز (كتابة / تفكير)
    const iris = lastLM[468];
    if (iris.y > 0.62) updateUI('focus', "يكتب 📝", "bg-success");
    else if (dist(lastLM[52], lastLM[282]) < bBrow * 0.9) updateUI('focus', "تركيز 🔥", "bg-success");
    else updateUI('focus', "مستقر", "bg-success");

    drawConnectors(ctx, lastLM, FACEMESH_TESSELATION, {color: '#ffffff30', lineWidth: 1});
  }function triggerAlarm(msg, color, withSound) {
    const a = document.getElementById('alarm');
    a.style.display = 'flex';
    a.style.background = color;
    a.querySelector('h1').innerText = msg;
    if (withSound) audioAlarm.play();
  }

  window.stopAlarm = () => {
    document.getElementById('alarm').style.display = 'none';
    audioAlarm.pause();
    timers.sleep = null; timers.absence = null;
  };

  function updateUI(type, text, color) {
    document.getElementById(`${type}-text`).innerText = text;
    document.getElementById(`dot-${type}`).className = `status-dot ${color}`;
  }

  const faceMesh = new FaceMesh({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
  faceMesh.setOptions({maxNumFaces:1, refineLandmarks:true, minDetectionConfidence:0.5});
  faceMesh.onResults(onResults);

  const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
  hands.setOptions({maxNumHands: 1, minDetectionConfidence: 0.5});
  hands.onResults((resHands) => { 
    // دمج نتائج اليد مع الوجه يتم داخل onResults الأصلي عبر تمرير البيانات
  });

  new Camera(video, {onFrame: async () => { 
    await faceMesh.send({image: video});
    await hands.send({image: video}); 
  }, width: 640, height: 480}).start();
</script>
</body>
</html>
