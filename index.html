<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <title>مساعد الدراسة الذكي - تحليل التركيز</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

  <style>
    body { margin: 0; background: #1a1a2e; color: white; text-align: center; font-family: 'Segoe UI', sans-serif; }
    #status-bar { padding: 15px; background: #16213e; font-size: 1.2rem; border-bottom: 4px solid #0f3460; transition: 0.3s; }
    .controls { padding: 20px; }
    #progress-container { width: 80%; max-width: 400px; height: 12px; background: #0f3460; border-radius: 6px; margin: 10px auto; display: none; overflow: hidden; }
    #progress-bar { width: 0%; height: 100%; background: #2ecc71; transition: width 0.1s linear; }
    button { padding: 12px 25px; font-size: 1rem; cursor: pointer; background: #e94560; border: none; color: white; border-radius: 8px; font-weight: bold; }
    .view-area { position: relative; width: 100%; height: 60vh; display: flex; justify-content: center; align-items: center; }
    video, canvas { position: absolute; width: 90%; max-width: 600px; border-radius: 20px; transform: scaleX(-1); }
    #overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(192, 57, 43, 0.9); z-index: 1000; flex-direction: column; justify-content: center; align-items: center; }
  </style>
</head>

<body>
  <div id="status-bar">🚀 جاري تجهيز مختبركِ الدراسي...</div>

  <div class="controls">
    <button id="calibBtn" onclick="startCalibration()">🎯 ابدأ المعايرة الشخصية</button>
    <div id="progress-container"><div id="progress-bar"></div></div>
  </div>

  <div id="overlay">
    <h1 style="font-size: 4rem;">⚠️ أووو! أنتِ نائمة!</h1>
    <p style="font-size: 2rem;">استيقظي يا بطلة، مستقبلكِ ينتظركِ! 📖</p>
  </div>

  <div class="view-area">
    <video id="input_video"></video>
    <canvas id="output_canvas"></canvas>
  </div>

  <script type="module">
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const statusBar = document.getElementById('status-bar');
    const progressBar = document.getElementById('progress-bar');
    const progressCont = document.getElementById('progress-container');
    const overlay = document.getElementById('overlay');

    let baseEAR = 0.25;
    let currentEAR = 0;
    let isCalibrating = false;
    let sleepTimer = null;
    let blinkCount = 0;
    let lastBlinkTime = 0;

    // --- حساب المسافات الرياضية (EAR) ---
    function getEAR(landmarks, p1, p2, p3, p4, p5, p6) {
      const v1 = Math.hypot(landmarks[p2].x - landmarks[p6].x, landmarks[p2].y - landmarks[p6].y);
      const v2 = Math.hypot(landmarks[p3].x - landmarks[p5].x, landmarks[p3].y - landmarks[p5].y);
      const h = Math.hypot(landmarks[p1].x - landmarks[p4].x, landmarks[p1].y - landmarks[p4].y);
      return (v1 + v2) / (2.0 * h);
    }

    // --- المعايرة مع شريط التقدم ---
    window.startCalibration = function() {
      if (isCalibrating) return;
      isCalibrating = true;
      document.getElementById('calibBtn').style.display = 'none';
      progressCont.style.display = 'block';
      let samples = [];
      
      const interval = setInterval(() => {
        if (currentEAR > 0) {
          samples.push(currentEAR);
          progressBar.style.width = (samples.length / 30) * 100 + '%';
        }
        if (samples.length >= 30) {
          clearInterval(interval);
          baseEAR = samples.reduce((a, b) => a + b) / samples.length;
          progressCont.style.display = 'none';
          document.getElementById('calibBtn').style.display = 'inline-block';
          document.getElementById('calibBtn').innerText = "✅ تحديث المعايرة";
          isCalibrating = false;
          alert("تم حفظ بصمة عينكِ بنجاح!");
        }
      }, 100);
    };

    function onResults(results) {
      canvasCtx.save();
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
      
      if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
        const landmarks = results.multiFaceLandmarks[0];
        const leftEAR = getEAR(landmarks, 33, 160, 158, 133, 153, 144);
        const rightEAR = getEAR(landmarks, 362, 385, 387, 263, 373, 380);
        currentEAR = (leftEAR + rightEAR) / 2;

        // --- تحليل الحالة (تركيز vs نعاس) ---
        if (currentEAR < baseEAR * 0.65) { 
          // العين مغلقة
          if (!sleepTimer) sleepTimer = Date.now();
          if (Date.now() - sleepTimer > 2500) { // التنبيه بعد 2.5 ثانية (تجاهل الرمش)
            overlay.style.display = "flex";
            statusBar.innerText = "❌ حالة نوم مكتشفة!";
            statusBar.style.background = "#c0392b";
          }
        } else {
          // العين مفتوحة
          overlay.style.display = "none";
          sleepTimer = null;
          
          // تحليل التركيز (قاعدة الرمش)
          if (currentEAR > baseEAR * 0.9) {
            statusBar.innerText = "🔥 تركيز عميق.. أنتِ في القمة!";
            statusBar.style.background = "#2ecc71";
          } else {
            statusBar.innerText = "📖 وضع الدراسة المستقرة";
            statusBar.style.background = "#16213e";
          }
        }
        
        drawConnectors(canvasCtx, landmarks, FACEMESH_TESSELATION, {color: '#C0C0C030', lineWidth: 1});
      }
      canvasCtx.restore();
    }

    const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
    faceMesh.setOptions({maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5});
    faceMesh.onResults(onResults);

    const camera = new Camera(videoElement, {
      onFrame: async () => { await faceMesh.send({image: videoElement}); },
      width: 640, height: 480
    });
    camera.start();
  </script>
</body>
</html>
