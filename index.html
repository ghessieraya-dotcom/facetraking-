<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <title>تتبع الوجه الذكي - MediaPipe</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

  <style>
    body { 
      margin: 0; 
      background: #1e272e; 
      color: white; 
      text-align: center; 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      overflow: hidden;
    }
    #status { 
      padding: 20px; 
      background: #2f3640; 
      font-size: 1.2rem;
      border-bottom: 2px solid #00d2d3;
    }
    .container { 
      position: relative; 
      width: 100vw; 
      height: 80vh; 
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #input_video { 
      position: absolute;
      width: 90%; 
      max-width: 640px;
      border-radius: 15px;
      transform: scaleX(-1); /* مرآة */
    }
    #output_canvas { 
      position: absolute; 
      width: 90%; 
      max-width: 640px;
      transform: scaleX(-1);
      z-index: 10;
    }
  </style>
</head>

<body>
  <div id="status">⏳ جاري تحميل محرك الذكاء الاصطناعي...</div>
  
  <div class="container">
    <video id="input_video"></video>
    <canvas id="output_canvas"></canvas>
  </div>

  <script type="module">
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const statusDiv = document.getElementById('status');

    // إعدادات الحجم للكانفاس
    canvasElement.width = 640;
    canvasElement.height = 480;

    function onResults(results) {
      canvasCtx.save();
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
      
      if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
        statusDiv.innerText = "✅ تم الاتصال: وجهك تحت المراقبة الآن!";
        statusDiv.style.color = "#1dd1a1";

        for (const landmarks of results.multiFaceLandmarks) {
          // رسم الشبكة الرفيعة على الوجه
          drawConnectors(canvasCtx, landmarks, FACEMESH_TESSELATION,
                         {color: '#C0C0C070', lineWidth: 1});
        }
      } else {
        statusDiv.innerText = "🔍 ابحث عن وجه... (تأكدي من الإضاءة)";
        statusDiv.style.color = "#ff6b6b";
      }
      canvasCtx.restore();
    }

    const faceMesh = new FaceMesh({locateFile: (file) => {
      return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
    }});

    faceMesh.setOptions({
      maxNumFaces: 1,
      refineLandmarks: true, // مهم جداً لتحليل العين والفم لاحقاً
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });

    faceMesh.onResults(onResults);

    // تشغيل الكاميرا مع معالجة الأخطاء
    const camera = new Camera(videoElement, {
      onFrame: async () => {
        await faceMesh.send({image: videoElement});
      },
      width: 640,
      height: 480
    });

    camera.start().catch(err => {
      alert("خطأ في تشغيل الكاميرا: " + err);
      statusDiv.innerText = "❌ فشل تشغيل الكاميرا";
    });
  </script>
</body>
</html>
