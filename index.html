
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <title>نظام آية المطور - v13.5</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
  <style>
    :root { --accent: #6366f1; --bg: #020617; --card: #0f172a; --success: #10b981; --danger: #ef4444; }
    body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; }
    #side-panel { width: 300px; background: var(--card); padding: 20px; border-left: 2px solid #1e293b; display: flex; flex-direction: column; gap: 15px; }
    .stat-card { background: #1e293b; padding: 12px; border-radius: 10px; border-right: 4px solid var(--accent); }
    #display-container { flex: 1; position: relative; background: #000; display: flex; justify-content: center; align-items: center; }
    video, canvas { position: absolute; width: auto; height: 90%; border-radius: 15px; transform: scaleX(-1); }
    #loading-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--accent); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    button { padding: 10px; border-radius: 5px; border: none; background: var(--accent); color: white; cursor: pointer; font-weight: bold; }
  </style>
</head>
<body>

<div id="loading-screen">
    <div class="loader"></div>
    <p id="load-text">جاري استدعاء الكاميرا...</p>
    <button id="skip-btn" style="display:none;" onclick="hideOverlay()">دخول يدوي للموقع</button>
</div>

<aside id="side-panel">
  <h3 style="text-align:center; color:var(--accent);">AYA AI v13.5</h3>
  <div class="stat-card">
    <div style="font-size:0.8rem; color:#94a3b8;">عداد الرمش</div>
    <div id="blink-val" style="font-size:1.8rem; font-weight:bold;">0</div>
  </div>
  <div class="stat-card">
    <div style="font-size:0.8rem; color:#94a3b8;">الحالة</div>
    <div id="status-val" style="color:var(--success); font-weight:bold;">مستقر</div>
  </div>
  <div class="stat-card">
    <div style="font-size:0.8rem; color:#94a3b8;">تحليل اليد</div>
    <div id="hand-val" style="font-size:0.9rem;">بانتظار الرصد</div>
  </div>
  <button onclick="location.reload()">تحديث النظام</button>
</aside>

<main id="display-container">
  <video id="v" playsinline muted></video>
  <canvas id="c"></canvas>
</main>

<script>
  const v = document.getElementById('v'), c = document.getElementById('c'), ctx = c.getContext('2d');
  let blinks = 0, isClosed = false, lastFaceResults = null;

  // 1. تشغيل الكاميرا فوراً (Native Camera) لكسر الجمود
  async function initCamera() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
      v.srcObject = stream;
      await v.play();
      document.getElementById('load-text').innerText = "تم تفعيل الكاميرا، جاري تحميل الذكاء الاصطناعي...";
      setTimeout(() => { document.getElementById('skip-btn').style.display = 'block'; }, 3000);
      requestAnimationFrame(process);
    } catch (err) {
      document.getElementById('load-text').innerText = "خطأ: لم نتمكن من الوصول للكاميرا!";
    }
  }

  // 2. إعداد محركات الذكاء الاصطناعي
  const faceMesh = new FaceMesh({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
  faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5 });
  faceMesh.onResults(res => { 
    lastFaceResults = res; 
    document.getElementById('loading-screen').style.display = 'none'; 
  });

  const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
  hands.setOptions({ maxNumHands: 1, minDetectionConfidence: 0.5 });
  let lastHandResults = null;
  hands.onResults(res => { lastHandResults = res.multiHandLandmarks; });

  // 3. المحرك الرئيسي المعالج (The Loop)
  async function process() {
    if (v.paused || v.ended) return;
    
    // إرسال الإطارات للمحركات
    await faceMesh.send({ image: v });
    if(lastFaceResults) await hands.send({ image: v });

    c.width = v.videoWidth; c.height = v.videoHeight;
    ctx.save();
    ctx.clearRect(0,0,c.width,c.height);
    ctx.drawImage(v, 0, 0, c.width, c.height);

    if (lastFaceResults && lastFaceResults.multiFaceLandmarks) {
      const lm = lastFaceResults.multiFaceLandmarks[0];
      drawConnectors(ctx, lm, FACEMESH_TESSELATION, {color: '#C0C0C030', lineWidth: 1});

      // منطق الرمش المطور (حساسية عالية 0.23)
      const ear = (Math.hypot(lm[159].x-lm[145].x, lm[159].y-lm[145].y) + Math.hypot(lm[386].x-lm[374].x, lm[386].y-lm[374].y)) / (2 * Math.hypot(lm[33].x-lm[133].x, lm[33].y-lm[133].y));
      
      if (ear < 0.23) { isClosed = true; } 
      else if (isClosed && ear > 0.25) { 
        blinks++; 
        document.getElementById('blink-val').innerText = blinks; 
        isClosed = false; 
      }

      // رصد الكتابة
      document.getElementById('status-val').innerText = (lm[468].y > 0.65) ? "يكتب الآن 📝" : "مركّز ✅";
    }

    if (lastHandResults && lastHandResults.length > 0) {
      for (const hlm of lastHandResults) {
        drawConnectors(ctx, hlm, HAND_CONNECTIONS, {color: '#00FF00', lineWidth: 2});
        document.getElementById('hand-val').innerText = "تم رصد اليد ✋";
      }
    }
    
    ctx.restore();
    requestAnimationFrame(process);
  }

  function hideOverlay() { document.getElementById('loading-screen').style.display = 'none'; }

  window.onload = initCamera;
</script>
</body>
</html>
