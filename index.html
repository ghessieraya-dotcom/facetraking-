<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Camera Test</title>
  <script src="tracking-min.js"></script>
  <script src="data/face-min.js"></script>
  <style>
    body { font-family: sans-serif; text-align: center; background: #222; color: white; }
    #video { border: 4px solid #444; border-radius: 10px; background: black; }
    #status { margin: 20px; padding: 15px; background: #333; border-radius: 8px; }
  </style>
</head>
<body>

  <h2>Step 1: Camera Test</h2>
  <div id="status">Checking for camera...</div>
  
  <video id="video" width="320" height="240" preload autoplay loop muted playsinline></video>

  <script>
    window.onload = function() {
      var video = document.getElementById('video');
      var status = document.getElementById('status');

      try {
        var tracker = new tracking.ObjectTracker('face');
        tracker.setInitialScale(4);
        tracker.setStepSize(2);
        tracker.setEdgesDensity(0.1);

        tracking.track('#video', tracker, { camera: true });

        tracker.on('track', function(event) {
          if (event.data.length > 0) {
            status.style.color = "#4CAF50";
            status.innerText = "SUCCESS: Face Detected!";
          } else {
            status.style.color = "#FFC107";
            status.innerText = "Camera is ON, looking for a face...";
          }
        });
      } catch (err) {
        status.style.color = "#F44336";
        status.innerText = "Error: " + err.message;
      }
    };
  </script>
</body>
</html>
